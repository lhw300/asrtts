<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceAPI Studio</title>
  <link rel="icon" type="image/svg+xml" href="./voice.png" />
  <script src="//cdn.jsdelivr.net/npm/alpinejs@3.13.7/dist/cdn.min.js" defer></script>
  <script src="./app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --surface2: #f9f9f7;
      --border: #e5e5e0;
      --border2: #d0d0c8;
      --text: #1a1a18;
      --text2: #6b6b65;
      --text3: #9b9b95;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --accent2: #059669;
      --accent2-light: #ecfdf5;
      --danger: #dc2626;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.75); }
    }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .badge {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
    }

    .header-link {
      color: var(--text2);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: all 0.15s;
    }

    .header-link:hover { background: var(--bg); color: var(--text); }

    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 20px;
    }

    @media (max-width: 860px) { .main { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .tts-card { grid-row: 1 / 3; }

    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .card-icon {
      width: 26px; height: 26px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }

    .icon-blue { background: var(--accent-light); }
    .icon-green { background: var(--accent2-light); }
    .icon-orange { background: #fff7ed; }

    .card-body { padding: 20px; }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: vertical;
      min-height: 180px;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

    .params-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    .param-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    input[type=number], select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type=number]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
      outline: none;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

    .btn-success { background: var(--accent2); color: white; }
    .btn-success:hover { background: #047857; }
    .btn-success:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

    .elapsed {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--accent-light);
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    .tool-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .tool-link:hover { text-decoration: underline; }

    /* ASR */
    .transcript-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      min-height: 120px;
      max-height: 180px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .transcript-empty {
      color: var(--text3);
      font-size: 13px;
      text-align: center;
      margin: auto;
    }

    .transcript-item { display: flex; justify-content: flex-end; }

    .transcript-bubble {
      background: var(--accent);
      color: white;
      padding: 6px 14px;
      border-radius: 16px 16px 4px 16px;
      font-size: 13px;
      max-width: 85%;
    }

    .transcript-current {
      color: var(--text2);
      font-size: 13px;
      text-align: center;
      font-style: italic;
    }

    .record-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 14px 0 2px;
    }

    .record-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }

    .record-btn:hover { transform: scale(1.06); box-shadow: var(--shadow-md); }

    .record-btn.recording {
      border-color: var(--danger);
      background: #fee2e2;
      animation: rec-pulse 1.5s ease-in-out infinite;
    }

    @keyframes rec-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
    }

    .record-label { font-size: 12px; color: var(--text3); font-weight: 500; }
    .record-label.active { color: var(--danger); }

    /* Offline ASR */
    input[type=file] {
      width: 100%;
      padding: 10px;
      background: var(--bg);
      border: 1px dashed var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .checkbox-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text2); cursor: pointer;
    }

    input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); }

    .meta-row {
      display: flex; flex-wrap: wrap; gap: 12px;
      margin-bottom: 12px;
    }

    .meta-item { font-size: 11px; color: var(--text3); }
    .meta-item strong { color: var(--text2); font-weight: 600; }

    .results-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      max-height: 150px;
      overflow-y: auto;
      padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .segment { padding: 8px 12px; border-radius: 8px; font-size: 13px; }
    .segment-left { background: #eff6ff; border-left: 3px solid var(--accent); color: #1e40af; }
    .segment-right { background: #ecfdf5; border-left: 3px solid var(--accent2); color: #065f46; }
    .segment-time { font-size: 11px; opacity: 0.6; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .col { display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>
<div x-data="demoapp">

  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      VoiceAPI Studio
    </div>
    <div class="header-right">
      <a href="./speaker_test.html" class="header-link">🎙 试音工具</a>
    </div>
  </header>

  <div class="main">

    <!-- TTS -->
    <div class="card tts-card">
      <div class="card-header">
        <div class="card-title">
          <div class="card-icon icon-blue">🔊</div>
          Text To Speech
        </div>
      </div>
      <div class="card-body">
        <textarea x-model="text" placeholder="输入要合成的文字..."></textarea>

        <div class="params-grid">
          <div class="param-group">
            <label>说话人</label>
            <select x-model="targetSid">
              <template x-for="i in Array.from({length: 174}, (_, i) => i)" :key="i">
                <option :value="i" x-text="'SID ' + i"></option>
              </template>
            </select>
          </div>
          <div class="param-group">
            <label>语速</label>
            <input type="number" step="0.05" x-model="targetSpeed" min="0.5" max="2.0">
          </div>
          <div class="param-group">
            <label>音量</label>
            <input type="number" step="0.1" x-model="targetVolume" min="0.1" max="2.0">
          </div>
          <div class="param-group">
            <label>采样率</label>
            <select x-model="targetRate">
              <option value="8000">8000</option>
              <option value="16000">16000</option>
              <option value="24000">24000</option>
            </select>
          </div>
        </div>

        <div class="row">
          <button @click="dotts" :disabled="disabled" class="btn btn-primary">▶ 合成播放</button>
          <template x-if="elapsedTime">
            <span class="elapsed">⚡ <span x-text="elapsedTime"></span></span>
          </template>
        </div>

        <div class="divider"></div>
        <a href="./speaker_test.html" class="tool-link">🎙 说话人试音工具 →</a>
      </div>
    </div>

    <!-- Online ASR -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <div class="card-icon icon-green">🎤</div>
          Online ASR
        </div>
      </div>
      <div class="card-body">
        <div class="transcript-box">
          <template x-if="logs.length === 0 && !currentText">
            <p class="transcript-empty">按下麦克风开始录音识别</p>
          </template>
          <template x-for="item in logs" :key="item.idx">
            <div class="transcript-item">
              <div class="transcript-bubble" x-text="item.text"></div>
            </div>
          </template>
          <template x-if="currentText">
            <p class="transcript-current" x-text="currentText + ' …'"></p>
          </template>
        </div>
        <div class="record-area">
          <button
            @click="recording ? stopasr() : doasr()"
            :class="recording ? 'record-btn recording' : 'record-btn'">
            <span x-text="recording ? '⏹' : '🎙'"></span>
          </button>
          <span :class="recording ? 'record-label active' : 'record-label'"
                x-text="recording ? '点击停止录音' : '点击开始录音'"></span>
        </div>
      </div>
    </div>

    <!-- Offline ASR -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <div class="card-icon icon-orange">📁</div>
          Offline ASR
        </div>
      </div>
      <div class="card-body">
        <div class="col" style="margin-bottom:14px;">
          <input type="file" accept=".mp3,.wav,.ogg" @change="file = $event.target.files[0]">
          <label class="checkbox-label">
            <input type="checkbox" x-model="useInt8">
            使用 SenseVoice int8 模型（更快）
          </label>
          <button @click="uploadFile" :disabled="!file" class="btn btn-success">⬆ 上传识别</button>
        </div>

        <template x-if="fileElapsed !== null">
          <div class="meta-row">
            <span class="meta-item"><strong>耗时</strong> <span x-text="formatSeconds(fileElapsed)"></span></span>
            <span class="meta-item"><strong>时长</strong> <span x-text="formatSeconds(fileAudioDuration)"></span></span>
            <span class="meta-item"><strong>RTF</strong> <span x-text="fileRtf ? fileRtf.toFixed(2) : '-'"></span></span>
            <span class="meta-item"><strong>模型</strong> <span x-text="fileModel"></span></span>
          </div>
        </template>

        <div class="results-box">
          <template x-if="fileResults.length === 0">
            <p style="color:var(--text3);font-size:13px;text-align:center;margin:auto;">上传音频文件后显示识别结果</p>
          </template>
          <template x-for="segment in fileResults" :key="segment.idx">
            <div :class="(segment.channel ?? 0) % 2 === 0 ? 'segment segment-left' : 'segment segment-right'">
              <div x-text="segment.text"></div>
              <div class="segment-time"
                x-text="`Ch${segment.channel ?? 0} · ${segment.start.toFixed(2)}s – ${segment.end.toFixed(2)}s`">
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
