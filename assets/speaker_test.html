<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>说话人试音 · VoiceAPI Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f9f9f7;
    --border: #e5e5e0;
    --border2: #d0d0c8;
    --text: #1a1a18;
    --text2: #6b6b65;
    --text3: #9b9b95;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --accent2: #059669;
    --danger: #dc2626;
    --warn: #d97706;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.02em;
    text-decoration: none;
    color: var(--text);
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.75); }
  }

  .logo-sub { font-size: 13px; color: var(--text3); font-weight: 400; }

  .header-link {
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }

  .header-link:hover { background: var(--bg); color: var(--text); }

  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .card-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .card-icon {
    width: 26px; height: 26px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    background: var(--accent-light);
  }

  .card-body { padding: 20px; }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 10px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    resize: vertical;
    min-height: 72px;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

  input[type=number], input[type=text] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

  .param-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }

  .params-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .param-group { display: flex; flex-direction: column; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
    outline: none;
    white-space: nowrap;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }

  .progress-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 14px;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 12px;
  }

  .status-ok { color: var(--accent2); }
  .fav-count { color: var(--warn); font-weight: 600; }

  .fav-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 20px;
    display: none;
  }

  .fav-bar-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  .fav-tags { display: flex; flex-wrap: wrap; gap: 8px; }

  .fav-tag {
    background: #fff7ed;
    color: var(--warn);
    border: 1px solid #fed7aa;
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .fav-tag:hover { background: #ffedd5; }

  .sid-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
    gap: 10px;
  }

  .sid-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s;
  }

  .sid-card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .sid-card.playing { border-color: var(--accent); background: var(--accent-light); }
  .sid-card.favorited { border-color: var(--warn); }
  .sid-card.loading { opacity: 0.5; }

  .sid-id { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent); }
  .sid-status { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .sid-status.ready { color: var(--accent2); }
  .sid-status.error { color: var(--danger); }

  .sid-actions { display: flex; gap: 6px; margin-top: 2px; }

  .btn-play {
    flex: 1;
    padding: 5px 6px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }

  .btn-play:hover { background: #1d4ed8; }
  .btn-play:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

  .btn-fav {
    padding: 5px 7px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-fav:hover { border-color: var(--warn); color: var(--warn); }
  .btn-fav.active { color: var(--warn); border-color: var(--warn); background: #fff7ed; }

  .wave {
    display: flex; gap: 2px; align-items: center; height: 16px; margin-bottom: 2px;
  }

  .wave span {
    width: 3px; background: var(--accent); border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave span:nth-child(2) { animation-delay: 0.12s; }
  .wave span:nth-child(3) { animation-delay: 0.24s; }
  .wave span:nth-child(4) { animation-delay: 0.36s; }
  .wave span:nth-child(5) { animation-delay: 0.48s; }

  @keyframes wave {
    0%, 100% { height: 3px; }
    50% { height: 14px; }
  }
</style>
</head>
<body>

<header>
  <a href="./index.html" class="logo">
    <span style="color:#dc2626;font-weight:800;font-size:22px;letter-spacing:-0.03em;">L</span>
    <span class="logo-sub">/ 说话人试音</span>
  </a>
  <a href="./index.html" class="header-link">← 返回主页</a>
</header>

<div class="main">

  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <div class="card-icon">🎙</div>
        批量试音配置
      </div>
    </div>
    <div class="card-body">
      <div>
        <label class="param-label">试音文本</label>
        <textarea id="text">您好，我是智能语音助手，请问有什么需要帮助的吗？</textarea>
      </div>
      <div class="params-row">
        <div class="param-group">
          <label class="param-label">服务地址</label>
          <input type="text" id="host" style="width:185px">
        </div>
        <div class="param-group">
          <label class="param-label">语速</label>
          <input type="number" id="speed" value="0.95" step="0.05" min="0.5" max="2.0" style="width:85px">
        </div>
        <div class="param-group">
          <label class="param-label">音量</label>
          <input type="number" id="volume" value="1.0" step="0.1" min="0.1" max="2.0" style="width:85px">
        </div>
        <div class="param-group">
          <label class="param-label">SID 从</label>
          <input type="number" id="rangeFrom" value="0" min="0" max="173" style="width:75px">
        </div>
        <div class="param-group">
          <label class="param-label">到</label>
          <input type="number" id="rangeTo" value="19" min="0" max="173" style="width:75px">
        </div>
        <button class="btn btn-primary" id="btnBatch" onclick="batchGenerate()">▶ 批量生成</button>
        <button class="btn btn-ghost" id="btnAutoPlay" onclick="toggleAutoPlay()" disabled>⏵ 批量播放</button>
        <button class="btn btn-ghost" onclick="clearAll()">清空</button>
      </div>
      <div class="progress-wrap" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="status-bar">
        <span id="statusText">设置范围后点击批量生成</span>
        <span id="countText"></span>
      </div>
    </div>
  </div>

  <div class="fav-bar" id="favBar">
    <div class="fav-bar-title">⭐ 收藏的声音 · 点击播放</div>
    <div class="fav-tags" id="favTags"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <div class="card-icon">🔊</div>
        声音列表
      </div>
      <span style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;">SID 0 – 173 · 共 174 个</span>
    </div>
    <div class="card-body">
      <div class="sid-grid" id="grid">
        <p style="color:var(--text3);font-size:13px;grid-column:1/-1;text-align:center;padding:24px 0;">
          点击上方「批量生成」开始试音
        </p>
      </div>
    </div>
  </div>

</div>

<script>
const favorites = new Set();

// 自动带入当前页面域名
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('host').value = window.location.origin;
});
const audioCache = {};
let currentAudio = null;
let currentCard = null;
let autoPlaying = false;
let autoPlayStop = false;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function toggleAutoPlay() {
  if (autoPlaying) {
    // 停止
    autoPlayStop = true;
    autoPlaying = false;
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    if (currentCard) { currentCard.classList.remove('playing'); currentCard = null; }
    document.getElementById('btnAutoPlay').textContent = '⏵ 批量播放';
    document.getElementById('statusText').textContent = '批量播放已停止';
    return;
  }

  // 收集所有就绪的 SID（按卡片顺序）
  const readySids = Object.keys(audioCache).map(Number).sort((a, b) => a - b);
  if (readySids.length === 0) { alert('没有已生成的声音'); return; }

  autoPlaying = true;
  autoPlayStop = false;
  document.getElementById('btnAutoPlay').textContent = '⏹ 停止播放';

  for (let i = 0; i < readySids.length; i++) {
    if (autoPlayStop) break;
    const sid = readySids[i];
    document.getElementById('statusText').textContent = `批量播放中 SID ${sid}（${i + 1}/${readySids.length}）`;

    // 高亮当前卡片
    if (currentCard) { currentCard.classList.remove('playing'); }
    const card = document.getElementById(`card-${sid}`);
    if (card) { card.classList.add('playing'); currentCard = card; }

    // 播放
    await new Promise(resolve => {
      const audio = new Audio(audioCache[sid]);
      currentAudio = audio;
      audio.play();
      audio.onended = resolve;
      audio.onerror = resolve;
    });

    if (autoPlayStop) break;
    if (currentCard) { currentCard.classList.remove('playing'); currentCard = null; }

    // 停顿 3 秒
    if (i < readySids.length - 1) {
      document.getElementById('statusText').textContent = `等待 3 秒... 下一个 SID ${readySids[i + 1]}`;
      await sleep(3000);
    }
  }

  if (!autoPlayStop) {
    document.getElementById('statusText').innerHTML = '<span class="status-ok">✓ 批量播放完成</span>';
  }
  autoPlaying = false;
  autoPlayStop = false;
  currentAudio = null;
  if (currentCard) { currentCard.classList.remove('playing'); currentCard = null; }
  document.getElementById('btnAutoPlay').textContent = '⏵ 批量播放';
}

function getConfig() {
  return {
    host: document.getElementById('host').value.trim(),
    text: document.getElementById('text').value.trim(),
    speed: parseFloat(document.getElementById('speed').value),
    volume: parseFloat(document.getElementById('volume').value),
    from: parseInt(document.getElementById('rangeFrom').value),
    to: parseInt(document.getElementById('rangeTo').value),
  };
}

function initGrid(from, to) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let sid = from; sid <= to; sid++) {
    const card = document.createElement('div');
    card.className = 'sid-card';
    card.id = `card-${sid}`;
    card.innerHTML = `
      <div class="sid-id">SID ${sid}</div>
      <div class="sid-status" id="status-${sid}">未生成</div>
      <div class="sid-actions">
        <button class="btn-play" onclick="playSid(${sid})" id="btn-${sid}" disabled>▶ 播放</button>
        <button class="btn-fav" onclick="toggleFav(${sid})" id="fav-${sid}">☆</button>
      </div>
    `;
    grid.appendChild(card);
  }
}

async function generateSid(sid, config) {
  const card = document.getElementById(`card-${sid}`);
  const status = document.getElementById(`status-${sid}`);
  const btn = document.getElementById(`btn-${sid}`);
  card.classList.add('loading');
  status.textContent = '生成中...';
  status.className = 'sid-status';
  try {
    const resp = await fetch(`${config.host}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: config.text, sid, samplerate: 8000, speed: config.speed, volume: config.volume })
    });
    if (!resp.ok) throw new Error();
    audioCache[sid] = URL.createObjectURL(await resp.blob());
    status.textContent = '就绪';
    status.className = 'sid-status ready';
    btn.disabled = false;
  } catch {
    status.textContent = '失败';
    status.className = 'sid-status error';
  } finally {
    card.classList.remove('loading');
  }
}

async function batchGenerate() {
  const config = getConfig();
  if (isNaN(config.from) || isNaN(config.to) || config.to < config.from) { alert('请检查 SID 范围'); return; }
  document.getElementById('btnBatch').disabled = true;
  initGrid(config.from, config.to);
  const total = config.to - config.from + 1;
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  progressBar.style.display = 'block';
  progressFill.style.width = '0%';
  let done = 0;
  const queue = Array.from({ length: total }, (_, i) => config.from + i);
  async function worker() {
    while (queue.length > 0) {
      const sid = queue.shift();
      await generateSid(sid, config);
      done++;
      progressFill.style.width = `${(done / total) * 100}%`;
      document.getElementById('statusText').textContent = `生成中 ${done} / ${total}`;
    }
  }
  await Promise.all([worker(), worker(), worker()]);
  progressBar.style.display = 'none';
  document.getElementById('statusText').innerHTML = `<span class="status-ok">✓ 完成，共 ${total} 个</span>`;
  document.getElementById('btnBatch').disabled = false;
  document.getElementById('btnAutoPlay').disabled = false;
}

function playSid(sid) {
  if (!audioCache[sid]) return;
  if (currentAudio) {
    currentAudio.pause();
    if (currentCard) {
      currentCard.classList.remove('playing');
      const w = currentCard.querySelector('.wave'); if (w) w.remove();
      const b = currentCard.querySelector('.btn-play'); if (b) b.textContent = '▶ 播放';
    }
  }
  if (currentCard && currentCard.id === `card-${sid}`) { currentAudio = null; currentCard = null; return; }
  const card = document.getElementById(`card-${sid}`);
  const btn = document.getElementById(`btn-${sid}`);
  const audio = new Audio(audioCache[sid]);
  currentAudio = audio; currentCard = card;
  card.classList.add('playing');
  btn.textContent = '⏹ 停止';
  const wave = document.createElement('div');
  wave.className = 'wave';
  wave.innerHTML = '<span></span><span></span><span></span><span></span><span></span>';
  card.querySelector('.sid-actions').before(wave);
  audio.play();
  audio.onended = () => {
    card.classList.remove('playing');
    btn.textContent = '▶ 播放';
    wave.remove();
    currentAudio = null; currentCard = null;
  };
}

function toggleFav(sid) {
  const btn = document.getElementById(`fav-${sid}`);
  const card = document.getElementById(`card-${sid}`);
  if (favorites.has(sid)) {
    favorites.delete(sid); btn.textContent = '☆'; btn.classList.remove('active'); card.classList.remove('favorited');
  } else {
    favorites.add(sid); btn.textContent = '★'; btn.classList.add('active'); card.classList.add('favorited');
  }
  updateFavBar();
}

function updateFavBar() {
  const bar = document.getElementById('favBar');
  const tags = document.getElementById('favTags');
  const countEl = document.getElementById('countText');
  if (favorites.size === 0) { bar.style.display = 'none'; countEl.textContent = ''; return; }
  bar.style.display = 'block';
  tags.innerHTML = '';
  [...favorites].sort((a, b) => a - b).forEach(sid => {
    const tag = document.createElement('span');
    tag.className = 'fav-tag';
    tag.textContent = `SID ${sid}`;
    tag.onclick = () => playSid(sid);
    tags.appendChild(tag);
  });
  countEl.innerHTML = `<span class="fav-count">★ ${favorites.size} 个收藏</span>`;
}

function clearAll() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; currentCard = null; }
  autoPlayStop = true; autoPlaying = false;
  document.getElementById('btnAutoPlay').textContent = '⏵ 批量播放';
  document.getElementById('btnAutoPlay').disabled = true;
  Object.keys(audioCache).forEach(k => { URL.revokeObjectURL(audioCache[k]); delete audioCache[k]; });
  favorites.clear();
  document.getElementById('grid').innerHTML = '<p style="color:var(--text3);font-size:13px;grid-column:1/-1;text-align:center;padding:24px 0;">点击上方「批量生成」开始试音</p>';
  document.getElementById('favBar').style.display = 'none';
  document.getElementById('statusText').textContent = '设置范围后点击批量生成';
  document.getElementById('countText').textContent = '';
}
</script>
</body>
</html>
